<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pastel Liquid Stats Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    min-height:100vh;
    background:
        linear-gradient(135deg,#ffd6ec,#dff7ff,#e6ddff);
    overflow-x:hidden;
    padding:40px;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    backdrop-filter:blur(80px);
    z-index:-1;
}

.dashboard{
    max-width:1300px;
    margin:auto;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.header h1{
    font-size:2rem;
    color:#4b4b65;
}

.header p{
    color:#777;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:24px;
}

.card{
    position:relative;
    padding:28px;
    border-radius:32px;

    background:rgba(255,255,255,0.35);

    backdrop-filter:blur(25px);
    -webkit-backdrop-filter:blur(25px);

    border:1px solid rgba(255,255,255,0.4);

    box-shadow:
        0 10px 40px rgba(255,255,255,0.35),
        inset 0 1px 0 rgba(255,255,255,0.6);

    transition:0.35s ease;
}

.card:hover{
    transform:translateY(-8px);
}

.card::before{
    content:"";
    position:absolute;
    width:140px;
    height:140px;
    border-radius:50%;
    top:-40px;
    right:-40px;
    opacity:.45;
    filter:blur(20px);
}

.card:nth-child(1)::before{
    background:#ffc8dd;
}

.card:nth-child(2)::before{
    background:#c7f0ff;
}

.card:nth-child(3)::before{
    background:#d8c8ff;
}

.card:nth-child(4)::before{
    background:#ffe6c7;
}

.card:nth-child(5)::before{
    background:#d9ffd7;
}

.card:nth-child(6)::before{
    background:#ffd8f6;
}

.label{
    color:#7d7d96;
    font-size:.95rem;
    margin-bottom:15px;
}

.value{
    font-size:2.4rem;
    font-weight:700;
    color:#4b4b65;
}

.change{
    margin-top:12px;
    display:inline-block;
    padding:8px 14px;
    border-radius:999px;
    background:rgba(255,255,255,.5);
    color:#6d6d85;
    font-size:.85rem;
}

.large-card{
    grid-column:span 2;
    min-height:250px;
}

.progress-box{
    margin-top:25px;
}

.progress{
    height:16px;
    border-radius:999px;
    overflow:hidden;
    background:rgba(255,255,255,.45);
}

.progress-fill{
    height:100%;
    width:78%;
    border-radius:999px;
    background:linear-gradient(
        90deg,
        #ffb7d5,
        #c7c2ff,
        #b6eeff
    );
}

.big-number{
    margin-top:18px;
    font-size:3rem;
    font-weight:700;
    color:#55516d;
}

.footer{
    margin-top:40px;
    text-align:center;
    color:#7f7f95;
}
</style>
</head>

<body>

<div class="dashboard">

    <div class="header">
        <div>
            <h1>🌷 Pastel Analytics</h1>
            <p>Soft Gradient Liquid Dashboard</p>
        </div>
    </div>

    <div class="grid">

        <div class="card">
            <div class="label">Daily Visitors</div>
            <div class="value" id="visitors">0</div>
            <div class="change">+12.5%</div>
        </div>

        <div class="card">
            <div class="label">Engagement Rate</div>
            <div class="value" id="engagement">0%</div>
            <div class="change">+8.1%</div>
        </div>

        <div class="card">
            <div class="label">Revenue</div>
            <div class="value" id="revenue">$0</div>
            <div class="change">+15.3%</div>
        </div>

        <div class="card">
            <div class="label">Conversion</div>
            <div class="value" id="conversion">0%</div>
            <div class="change">+5.7%</div>
        </div>

        <div class="card large-card">
            <div class="label">Monthly Growth</div>

            <div class="progress-box">
                <div class="progress">
                    <div class="progress-fill"></div>
                </div>
            </div>

            <div class="big-number" id="growth">0%</div>
        </div>

        <div class="card">
            <div class="label">Active Users</div>
            <div class="value" id="users">0</div>
            <div class="change">+10.2%</div>
        </div>

    </div>

    <div class="footer">
        ✨ Liquid Glass • Pastel Gradients • Aesthetic Dashboard
    </div>

</div>

<script>

function random(min,max){
    return Math.floor(Math.random()*(max-min+1))+min;
}

document.getElementById("visitors").innerText =
random(2500,12000).toLocaleString();

document.getElementById("engagement").innerText =
random(65,98) + "%";

document.getElementById("revenue").innerText =
"$" + random(12000,85000).toLocaleString();

document.getElementById("conversion").innerText =
random(12,35) + "%";

document.getElementById("growth").innerText =
random(70,95) + "%";

document.getElementById("users").innerText =
random(1000,8000).toLocaleString();

</script>

</body>
</html>
